services:
  api-0:
    image: ghcr.io/gabrielrauch/rinha-2026:dba2e7986b6395ef4d9f1eace356f05c325b4a71
    environment:
      - RINHA_SOCK=/run/sock/api0.sock
    volumes:
      - sock:/run/sock
    networks: [rinha]
    deploy:
      resources:
        limits:
          cpus: '0.475'
          memory: '165M'
  api-1:
    image: ghcr.io/gabrielrauch/rinha-2026:dba2e7986b6395ef4d9f1eace356f05c325b4a71
    environment:
      - RINHA_SOCK=/run/sock/api1.sock
    volumes:
      - sock:/run/sock
    networks: [rinha]
    deploy:
      resources:
        limits:
          cpus: '0.475'
          memory: '165M'
  lb:
    image: haproxy:2.9-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    depends_on: [api-0, api-1]
    networks: [rinha]
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: '20M'

networks:
  rinha:
    driver: bridge

volumes:
  sock:
