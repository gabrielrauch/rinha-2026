global
    maxconn 4000

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    option http-keep-alive

frontend http_in
    bind *:9999
    default_backend apis

backend apis
    balance roundrobin
    server api0 api-0:8000 maxconn 1000
    server api1 api-1:8000 maxconn 1000
